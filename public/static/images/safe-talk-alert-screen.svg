<svg width="300" height="600" viewBox="0 0 300 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Phone frame -->
  <rect x="10" y="10" width="280" height="580" rx="40" fill="#1a1a1a"/>
  <rect x="20" y="20" width="260" height="560" rx="30" fill="#000"/>
  
  <!-- Screen with alert overlay -->
  <rect x="25" y="60" width="250" height="480" rx="25" fill="#fef2f2"/>
  
  <!-- Status bar -->
  <rect x="25" y="25" width="250" height="30" rx="15" fill="#000"/>
  <text x="40" y="43" font-size="12" fill="white">9:41</text>
  <text x="220" y="43" font-size="12" fill="white">100%</text>
  
  <!-- Alert header -->
  <rect x="25" y="60" width="250" height="60" fill="#dc2626"/>
  <text x="50" y="85" font-size="14" font-weight="bold" fill="white">⚠️ OSTRZEŻENIE OSZUSTWA</text>
  <text x="50" y="105" font-size="12" fill="#fecaca">Safe Talk wykrył podejrzaną rozmowę</text>
  
  <!-- Main alert content -->
  <rect x="35" y="140" width="230" height="200" rx="20" fill="white" stroke="#ef4444" stroke-width="3"/>
  
  <!-- Alert icon -->
  <circle cx="150" cy="180" r="25" fill="#ef4444"/>
  <text x="150" y="190" text-anchor="middle" font-size="24" fill="white">⚠️</text>
  
  <!-- Alert title -->
  <text x="150" y="225" text-anchor="middle" font-size="18" font-weight="bold" fill="#dc2626">POTENCJALNE OSZUSTWO</text>
  
  <!-- Alert details -->
  <text x="150" y="250" text-anchor="middle" font-size="14" fill="#7f1d1d">Rozmówca używa technik</text>
  <text x="150" y="270" text-anchor="middle" font-size="14" fill="#7f1d1d">manipulacyjnych typowych</text>
  <text x="150" y="290" text-anchor="middle" font-size="14" fill="#7f1d1d">dla oszustów bankowych</text>
  
  <!-- Risk level -->
  <rect x="50" y="305" width="200" height="25" rx="12" fill="#fecaca"/>
  <text x="150" y="320" text-anchor="middle" font-size="12" font-weight="bold" fill="#991b1b">WYSOKIE RYZYKO: 95%</text>
  
  <!-- Action buttons -->
  <rect x="50" y="360" width="90" height="40" rx="20" fill="#dc2626"/>
  <text x="95" y="383" text-anchor="middle" font-size="14" font-weight="bold" fill="white">ZAKOŃCZ</text>
  
  <rect x="160" y="360" width="90" height="40" rx="20" fill="transparent" stroke="#dc2626" stroke-width="2"/>
  <text x="205" y="383" text-anchor="middle" font-size="14" font-weight="bold" fill="#dc2626">KONTYNUUJ</text>
  
  <!-- Warning indicators -->
  <text x="50" y="430" font-size="14" font-weight="bold" fill="#dc2626">Wykryte sygnały ostrzegawcze:</text>
  
  <text x="50" y="450" font-size="12" fill="#7f1d1d">• Prośba o dane bankowe</text>
  <text x="50" y="470" font-size="12" fill="#7f1d1d">• Wywieranie presji czasowej</text>
  <text x="50" y="490" font-size="12" fill="#7f1d1d">• Podszywanie się pod bank</text>
  <text x="50" y="510" font-size="12" fill="#7f1d1d">• Nieznany numer</text>
  
  <!-- Call info -->
  <rect x="35" y="520" width="230" height="40" rx="10" fill="#fee2e2"/>
  <text x="50" y="535" font-size="12" font-weight="bold" fill="#991b1b">Numer: +48 800 123 456</text>
  <text x="50" y="550" font-size="12" fill="#7f1d1d">Czas rozmowy: 01:23</text>
  
  <!-- Bottom navigation (dimmed) -->
  <rect x="25" y="540" width="250" height="60" fill="#f3f4f6" opacity="0.5"/>
  
  <!-- Pulsing effect overlay -->
  <rect x="25" y="60" width="250" height="480" rx="25" fill="none" stroke="#ef4444" stroke-width="4" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" repeatCount="indefinite"/>
  </rect>
</svg>