<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">Analiza w czasie rzeczywistym</text>
  
  <!-- Phone call visualization -->
  <rect x="50" y="60" width="120" height="180" rx="20" fill="#3AB5B2" opacity="0.1"/>
  <text x="110" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#3AB5B2">Rozmówca</text>
  
  <!-- Sound waves from caller -->
  <path d="M170 120 Q190 110 210 120 T250 120" fill="none" stroke="#71C6DA" stroke-width="3"/>
  <path d="M170 140 Q190 130 210 140 T250 140" fill="none" stroke="#71C6DA" stroke-width="3"/>
  <path d="M170 160 Q190 150 210 160 T250 160" fill="none" stroke="#71C6DA" stroke-width="3"/>
  
  <!-- AI Analysis box -->
  <rect x="250" y="100" width="100" height="80" rx="10" fill="white" stroke="#8974B2" stroke-width="2"/>
  <text x="300" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#8974B2">AI Analiza</text>
  <circle cx="285" cy="140" r="3" fill="#C5D54E"/>
  <circle cx="300" cy="140" r="3" fill="#C5D54E"/>
  <circle cx="315" cy="140" r="3" fill="#C5D54E"/>
  <text x="300" y="165" text-anchor="middle" font-size="10" fill="#8974B2">Przetwarzanie...</text>
  
  <!-- Real-time indicator -->
  <rect x="270" y="70" width="60" height="20" rx="10" fill="#ef4444"/>
  <text x="300" y="83" text-anchor="middle" font-size="10" font-weight="bold" fill="white">LIVE</text>
  
  <!-- Timeline -->
  <line x1="50" y1="260" x2="350" y2="260" stroke="#e2e8f0" stroke-width="2"/>
  <text x="50" y="280" font-size="10" fill="#64748b">0s</text>
  <text x="150" y="280" font-size="10" fill="#64748b">1s</text>
  <text x="250" y="280" font-size="10" fill="#64748b">2s</text>
  <text x="350" y="280" font-size="10" fill="#64748b">3s</text>
  
  <!-- Analysis markers -->
  <circle cx="100" cy="260" r="4" fill="#22c55e"/>
  <circle cx="200" cy="260" r="4" fill="#f59e0b"/>
  <circle cx="300" cy="260" r="4" fill="#ef4444"/>
  
  <!-- Legend -->
  <circle cx="60" cy="290" r="3" fill="#22c55e"/>
  <text x="70" y="295" font-size="9" fill="#64748b">Bezpieczne</text>
  
  <circle cx="140" cy="290" r="3" fill="#f59e0b"/>
  <text x="150" y="295" font-size="9" fill="#64748b">Podejrzane</text>
  
  <circle cx="220" cy="290" r="3" fill="#ef4444"/>
  <text x="230" y="295" font-size="9" fill="#64748b">Oszustwo</text>
</svg>