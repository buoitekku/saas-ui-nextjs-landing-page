<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="400" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">Safe Talk vs Tradycyjne rozwiązania</text>
  
  <!-- Dividing line -->
  <line x1="300" y1="50" x2="300" y2="380" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Traditional side -->
  <text x="150" y="70" text-anchor="middle" font-size="16" font-weight="bold" fill="#dc2626">Tradycyjne rozwiązania</text>
  
  <!-- Traditional timeline -->
  <rect x="50" y="90" width="200" height="40" rx="20" fill="#fef2f2"/>
  <text x="150" y="115" text-anchor="middle" font-size="14" fill="#dc2626">1. Rozmowa z oszustem</text>
  
  <path d="M150 130 L150 150" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowRed)"/>
  
  <rect x="50" y="150" width="200" height="40" rx="20" fill="#fef2f2"/>
  <text x="150" y="175" text-anchor="middle" font-size="14" fill="#dc2626">2. Przekazanie danych</text>
  
  <path d="M150 190 L150 210" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowRed)"/>
  
  <rect x="50" y="210" width="200" height="40" rx="20" fill="#fef2f2"/>
  <text x="150" y="235" text-anchor="middle" font-size="14" fill="#dc2626">3. Strata finansowa</text>
  
  <path d="M150 250 L150 270" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowRed)"/>
  
  <rect x="50" y="270" width="200" height="40" rx="20" fill="#fef2f2"/>
  <text x="150" y="295" text-anchor="middle" font-size="14" fill="#dc2626">4. Zgłoszenie na policję</text>
  
  <!-- Traditional problems -->
  <text x="150" y="335" text-anchor="middle" font-size="12" font-weight="bold" fill="#7f1d1d">Problemy:</text>
  <text x="150" y="350" text-anchor="middle" font-size="10" fill="#991b1b">• Reakcja po fakcie</text>
  <text x="150" y="365" text-anchor="middle" font-size="10" fill="#991b1b">• Brak ochrony w czasie rzeczywistym</text>
  <text x="150" y="380" text-anchor="middle" font-size="10" fill="#991b1b">• Trudne odzyskanie strat</text>
  
  <!-- Safe Talk side -->
  <text x="450" y="70" text-anchor="middle" font-size="16" font-weight="bold" fill="#22c55e">Safe Talk</text>
  
  <!-- Safe Talk timeline -->
  <rect x="350" y="90" width="200" height="40" rx="20" fill="#f0fdf4"/>
  <text x="450" y="115" text-anchor="middle" font-size="14" fill="#16a34a">1. Rozmowa rozpoczęta</text>
  
  <path d="M450 130 L450 150" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  
  <rect x="350" y="150" width="200" height="40" rx="20" fill="#f0fdf4"/>
  <text x="450" y="175" text-anchor="middle" font-size="14" fill="#16a34a">2. AI wykrywa oszustwo</text>
  
  <path d="M450 190 L450 210" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  
  <rect x="350" y="210" width="200" height="40" rx="20" fill="#f0fdf4"/>
  <text x="450" y="235" text-anchor="middle" font-size="14" fill="#16a34a">3. Natychmiastowe ostrzeżenie</text>
  
  <path d="M450 250 L450 270" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  
  <rect x="350" y="270" width="200" height="40" rx="20" fill="#f0fdf4"/>
  <text x="450" y="295" text-anchor="middle" font-size="14" fill="#16a34a">4. Rozmowa zakończona</text>
  
  <!-- Safe Talk benefits -->
  <text x="450" y="335" text-anchor="middle" font-size="12" font-weight="bold" fill="#14532d">Korzyści:</text>
  <text x="450" y="350" text-anchor="middle" font-size="10" fill="#166534">• Ochrona w czasie rzeczywistym</text>
  <text x="450" y="365" text-anchor="middle" font-size="10" fill="#166534">• Zapobieganie stratom</text>
  <text x="450" y="380" text-anchor="middle" font-size="10" fill="#166534">• 95% skuteczność wykrywania</text>
  
  <!-- Time indicators -->
  <rect x="80" y="320" width="60" height="20" rx="10" fill="#dc2626"/>
  <text x="110" y="333" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Dni/Tygodnie</text>
  
  <rect x="460" y="320" width="60" height="20" rx="10" fill="#22c55e"/>
  <text x="490" y="333" text-anchor="middle" font-size="10" font-weight="bold" fill="white">&lt;1 sekunda</text>
  
  <!-- Alert icons -->
  <circle cx="520" cy="175" r="15" fill="#ef4444"/>
  <text x="520" y="180" text-anchor="middle" font-size="12" fill="white">⚠️</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" 
     refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" 
     refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e" />
    </marker>
  </defs>
</svg>