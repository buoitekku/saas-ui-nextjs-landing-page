<svg width="300" height="600" viewBox="0 0 300 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Phone frame -->
  <rect x="10" y="10" width="280" height="580" rx="40" fill="#1a1a1a"/>
  <rect x="20" y="20" width="260" height="560" rx="30" fill="#000"/>
  
  <!-- Screen -->
  <rect x="25" y="60" width="250" height="480" rx="25" fill="#ffffff"/>
  
  <!-- Status bar -->
  <rect x="25" y="25" width="250" height="30" rx="15" fill="#000"/>
  <text x="40" y="43" font-size="12" fill="white">9:41</text>
  <text x="220" y="43" font-size="12" fill="white">100%</text>
  <rect x="235" y="35" width="20" height="10" rx="2" fill="white"/>
  <rect x="237" y="37" width="16" height="6" rx="1" fill="#4ade80"/>
  
  <!-- App header -->
  <rect x="25" y="60" width="250" height="60" fill="#3AB5B2"/>
  <text x="50" y="95" font-size="18" font-weight="bold" fill="white">Safe Talk</text>
  <circle cx="230" cy="90" r="15" fill="rgba(255,255,255,0.2)"/>
  <text x="230" y="95" text-anchor="middle" font-size="12" fill="white">⚙️</text>
  
  <!-- Protection status -->
  <rect x="35" y="130" width="230" height="80" rx="15" fill="#f0fdf4"/>
  <rect x="35" y="130" width="230" height="25" rx="15" fill="#22c55e"/>
  <text x="150" y="147" text-anchor="middle" font-size="14" font-weight="bold" fill="white">🛡️ OCHRONA AKTYWNA</text>
  
  <text x="50" y="175" font-size="14" font-weight="bold" fill="#16a34a">Status: Chroniony</text>
  <text x="50" y="195" font-size="12" fill="#4b5563">Ostatnia analiza: 2 min temu</text>
  
  <!-- Current call section -->
  <rect x="35" y="220" width="230" height="100" rx="15" fill="#fef3c7"/>
  <text x="50" y="245" font-size="16" font-weight="bold" fill="#d97706">📞 Trwająca rozmowa</text>
  <text x="50" y="265" font-size="14" fill="#92400e">+48 123 456 789</text>
  <text x="50" y="285" font-size="12" fill="#78716c">Czas: 02:34</text>
  
  <!-- Risk indicator -->
  <rect x="180" y="240" width="70" height="30" rx="15" fill="#22c55e"/>
  <text x="215" y="258" text-anchor="middle" font-size="12" font-weight="bold" fill="white">BEZPIECZNE</text>
  
  <!-- Analysis indicators -->
  <rect x="50" y="295" width="60" height="20" rx="10" fill="#e5e7eb"/>
  <rect x="50" y="295" width="45" height="20" rx="10" fill="#3AB5B2"/>
  <text x="125" y="307" font-size="10" fill="#6b7280">Analiza AI: 75%</text>
  
  <!-- Recent activity -->
  <text x="50" y="345" font-size="16" font-weight="bold" fill="#374151">Ostatnia aktywność</text>
  
  <!-- Activity item 1 -->
  <rect x="35" y="355" width="230" height="50" rx="10" fill="#fef2f2"/>
  <circle cx="55" cy="380" r="8" fill="#ef4444"/>
  <text x="55" y="384" text-anchor="middle" font-size="10" fill="white">⚠️</text>
  <text x="75" y="375" font-size="12" font-weight="bold" fill="#dc2626">Podejrzana rozmowa wykryta</text>
  <text x="75" y="390" font-size="10" fill="#7f1d1d">Dzisiaj, 14:23 - +48 800 123 456</text>
  
  <!-- Activity item 2 -->
  <rect x="35" y="410" width="230" height="50" rx="10" fill="#f0fdf4"/>
  <circle cx="55" cy="435" r="8" fill="#22c55e"/>
  <text x="55" y="439" text-anchor="middle" font-size="10" fill="white">✓</text>
  <text x="75" y="430" font-size="12" font-weight="bold" fill="#16a34a">Rozmowa bezpieczna</text>
  <text x="75" y="445" font-size="10" fill="#14532d">Wczoraj, 16:45 - Mama</text>
  
  <!-- Activity item 3 -->
  <rect x="35" y="465" width="230" height="50" rx="10" fill="#fef3c7"/>
  <circle cx="55" cy="490" r="8" fill="#f59e0b"/>
  <text x="55" y="494" text-anchor="middle" font-size="10" fill="white">!</text>
  <text x="75" y="485" font-size="12" font-weight="bold" fill="#d97706">Nieznany numer</text>
  <text x="75" y="500" font-size="10" fill="#92400e">Wczoraj, 12:15 - +48 22 123 4567</text>
  
  <!-- Bottom navigation -->
  <rect x="25" y="540" width="250" height="60" fill="#f9fafb"/>
  <line x1="25" y1="540" x2="275" y2="540" stroke="#e5e7eb" stroke-width="1"/>
  
  <!-- Nav items -->
  <rect x="45" y="555" width="40" height="30" rx="5" fill="#3AB5B2"/>
  <text x="65" y="573" text-anchor="middle" font-size="10" font-weight="bold" fill="white">🏠</text>
  
  <rect x="105" y="555" width="40" height="30" rx="5" fill="transparent"/>
  <text x="125" y="573" text-anchor="middle" font-size="10" fill="#6b7280">📊</text>
  
  <rect x="165" y="555" width="40" height="30" rx="5" fill="transparent"/>
  <text x="185" y="573" text-anchor="middle" font-size="10" fill="#6b7280">⚙️</text>
  
  <rect x="215" y="555" width="40" height="30" rx="5" fill="transparent"/>
  <text x="235" y="573" text-anchor="middle" font-size="10" fill="#6b7280">ℹ️</text>
  
  <!-- Home indicator -->
  <rect x="130" y="570" width="40" height="4" rx="2" fill="#d1d5db"/>
</svg>