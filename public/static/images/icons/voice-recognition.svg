<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Voice Recognition icon with microphone and sound waves -->
  <circle cx="32" cy="32" r="30" fill="#71C6DA" opacity="0.1"/>
  
  <!-- Microphone body -->
  <rect x="28" y="20" width="8" height="16" rx="4" fill="white" stroke="#71C6DA" stroke-width="2"/>
  
  <!-- Microphone grille -->
  <line x1="30" y1="24" x2="34" y2="24" stroke="#71C6DA" stroke-width="1"/>
  <line x1="30" y1="27" x2="34" y2="27" stroke="#71C6DA" stroke-width="1"/>
  <line x1="30" y1="30" x2="34" y2="30" stroke="#71C6DA" stroke-width="1"/>
  <line x1="30" y1="33" x2="34" y2="33" stroke="#71C6DA" stroke-width="1"/>
  
  <!-- Microphone stand -->
  <line x1="32" y1="36" x2="32" y2="44" stroke="#71C6DA" stroke-width="2"/>
  <line x1="28" y1="44" x2="36" y2="44" stroke="#71C6DA" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Sound waves -->
  <path d="M40 28 C42 26 42 30 40 32 C42 34 42 38 40 36" 
        fill="none" stroke="#3AB5B2" stroke-width="2" stroke-linecap="round"/>
  <path d="M44 24 C48 20 48 32 48 32 C48 32 48 44 44 40" 
        fill="none" stroke="#3AB5B2" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Voice pattern recognition -->
  <path d="M12 32 L14 30 L16 34 L18 28 L20 36 L22 30 L24 32" 
        fill="none" stroke="#C5D54E" stroke-width="2" stroke-linecap="round"/>
  
  <!-- AI analysis indicators -->
  <circle cx="16" cy="20" r="2" fill="#8974B2" opacity="0.6"/>
  <circle cx="20" cy="16" r="1.5" fill="#8974B2" opacity="0.6"/>
  <circle cx="12" cy="16" r="1.5" fill="#8974B2" opacity="0.6"/>
  
  <!-- Recognition pattern -->
  <path d="M14 18 Q16 16 18 18" fill="none" stroke="#8974B2" stroke-width="1" opacity="0.6"/>
</svg>