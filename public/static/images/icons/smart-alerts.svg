<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Smart Alerts icon with bell and intelligence indicators -->
  <circle cx="32" cy="32" r="30" fill="#C5D54E" opacity="0.1"/>
  
  <!-- Bell shape -->
  <path d="M32 12 C26 12 22 16 22 22 L22 32 C22 34 20 36 18 36 L46 36 C44 36 42 34 42 32 L42 22 C42 16 38 12 32 12 Z" 
        fill="white" stroke="#C5D54E" stroke-width="2"/>
  
  <!-- Bell clapper -->
  <circle cx="32" cy="36" r="2" fill="#C5D54E"/>
  
  <!-- Bell bottom -->
  <path d="M28 40 C28 42 30 44 32 44 C34 44 36 42 36 40" 
        fill="none" stroke="#C5D54E" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Smart indicators - brain waves -->
  <path d="M12 24 Q16 20 20 24 T28 24" fill="none" stroke="#3AB5B2" stroke-width="2" opacity="0.7"/>
  <path d="M36 24 Q40 20 44 24 T52 24" fill="none" stroke="#3AB5B2" stroke-width="2" opacity="0.7"/>
  
  <!-- Alert notification -->
  <circle cx="44" cy="20" r="6" fill="#FF6B6B"/>
  <text x="44" y="24" text-anchor="middle" font-size="10" font-weight="bold" fill="white">!</text>
  
  <!-- Intelligence dots -->
  <circle cx="24" cy="16" r="1.5" fill="#8974B2"/>
  <circle cx="28" cy="14" r="1.5" fill="#8974B2"/>
  <circle cx="32" cy="16" r="1.5" fill="#8974B2"/>
  <circle cx="36" cy="14" r="1.5" fill="#8974B2"/>
  <circle cx="40" cy="16" r="1.5" fill="#8974B2"/>
  
  <!-- Connection lines -->
  <line x1="24" y1="16" x2="28" y2="14" stroke="#8974B2" stroke-width="1" opacity="0.5"/>
  <line x1="28" y1="14" x2="32" y2="16" stroke="#8974B2" stroke-width="1" opacity="0.5"/>
  <line x1="32" y1="16" x2="36" y2="14" stroke="#8974B2" stroke-width="1" opacity="0.5"/>
  <line x1="36" y1="14" x2="40" y2="16" stroke="#8974B2" stroke-width="1" opacity="0.5"/>
</svg>