<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Real-time analysis icon with clock and wave patterns -->
  <circle cx="32" cy="32" r="30" fill="#3AB5B2" opacity="0.1"/>
  <circle cx="32" cy="32" r="24" fill="none" stroke="#3AB5B2" stroke-width="2"/>
  
  <!-- Clock face -->
  <circle cx="32" cy="32" r="16" fill="white" stroke="#3AB5B2" stroke-width="2"/>
  
  <!-- Clock hands pointing to real-time -->
  <line x1="32" y1="32" x2="32" y2="20" stroke="#3AB5B2" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="40" y2="32" stroke="#3AB5B2" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Real-time wave indicators -->
  <path d="M8 32 Q12 28 16 32 T24 32" fill="none" stroke="#71C6DA" stroke-width="2" opacity="0.7"/>
  <path d="M40 32 Q44 28 48 32 T56 32" fill="none" stroke="#71C6DA" stroke-width="2" opacity="0.7"/>
  
  <!-- Center dot -->
  <circle cx="32" cy="32" r="2" fill="#3AB5B2"/>
  
  <!-- Live indicator -->
  <circle cx="48" cy="16" r="4" fill="#C5D54E"/>
  <text x="48" y="20" text-anchor="middle" font-size="8" font-weight="bold" fill="white">●</text>
</svg>