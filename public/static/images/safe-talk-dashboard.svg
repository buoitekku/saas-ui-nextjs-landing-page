<svg width="300" height="600" viewBox="0 0 300 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Phone frame -->
  <rect x="10" y="10" width="280" height="580" rx="40" fill="#1a1a1a"/>
  <rect x="20" y="20" width="260" height="560" rx="30" fill="#000"/>
  
  <!-- Screen -->
  <rect x="25" y="60" width="250" height="480" rx="25" fill="#ffffff"/>
  
  <!-- Status bar -->
  <rect x="25" y="25" width="250" height="30" rx="15" fill="#000"/>
  <text x="40" y="43" font-size="12" fill="white">9:41</text>
  <text x="220" y="43" font-size="12" fill="white">100%</text>
  
  <!-- App header -->
  <rect x="25" y="60" width="250" height="50" fill="#3AB5B2"/>
  <text x="50" y="90" font-size="16" font-weight="bold" fill="white">📊 Statystyki</text>
  
  <!-- Stats cards -->
  <rect x="35" y="125" width="105" height="70" rx="10" fill="#f0fdf4"/>
  <text x="50" y="145" font-size="12" font-weight="bold" fill="#16a34a">Rozmowy chronione</text>
  <text x="50" y="165" font-size="24" font-weight="bold" fill="#22c55e">247</text>
  <text x="50" y="180" font-size="10" fill="#4ade80">+12 w tym tygodniu</text>
  
  <rect x="160" y="125" width="105" height="70" rx="10" fill="#fef2f2"/>
  <text x="175" y="145" font-size="12" font-weight="bold" fill="#dc2626">Oszustwa wykryte</text>
  <text x="175" y="165" font-size="24" font-weight="bold" fill="#ef4444">3</text>
  <text x="175" y="180" font-size="10" fill="#f87171">Ostatnie: 2 dni temu</text>
  
  <!-- Weekly chart -->
  <text x="50" y="225" font-size="14" font-weight="bold" fill="#374151">Aktywność w tym tygodniu</text>
  
  <rect x="35" y="235" width="230" height="100" rx="10" fill="#f9fafb"/>
  
  <!-- Chart bars -->
  <rect x="50" y="290" width="15" height="30" fill="#3AB5B2"/>
  <rect x="70" y="280" width="15" height="40" fill="#3AB5B2"/>
  <rect x="90" y="285" width="15" height="35" fill="#3AB5B2"/>
  <rect x="110" y="275" width="15" height="45" fill="#3AB5B2"/>
  <rect x="130" y="295" width="15" height="25" fill="#3AB5B2"/>
  <rect x="150" y="270" width="15" height="50" fill="#3AB5B2"/>
  <rect x="170" y="285" width="15" height="35" fill="#3AB5B2"/>
  
  <!-- Chart labels -->
  <text x="57" y="330" font-size="8" fill="#6b7280">Pn</text>
  <text x="77" y="330" font-size="8" fill="#6b7280">Wt</text>
  <text x="97" y="330" font-size="8" fill="#6b7280">Śr</text>
  <text x="117" y="330" font-size="8" fill="#6b7280">Cz</text>
  <text x="137" y="330" font-size="8" fill="#6b7280">Pt</text>
  <text x="157" y="330" font-size="8" fill="#6b7280">Sb</text>
  <text x="177" y="330" font-size="8" fill="#6b7280">Nd</text>
  
  <!-- Recent threats -->
  <text x="50" y="365" font-size="14" font-weight="bold" fill="#374151">Ostatnie zagrożenia</text>
  
  <rect x="35" y="375" width="230" height="40" rx="8" fill="#fef2f2"/>
  <circle cx="55" cy="395" r="6" fill="#ef4444"/>
  <text x="55" y="398" text-anchor="middle" font-size="8" fill="white">!</text>
  <text x="70" y="390" font-size="11" font-weight="bold" fill="#dc2626">Oszustwo bankowe</text>
  <text x="70" y="405" font-size="9" fill="#7f1d1d">2 dni temu • +48 800 123 456</text>
  <text x="220" y="398" font-size="9" fill="#dc2626">95%</text>
  
  <rect x="35" y="420" width="230" height="40" rx="8" fill="#fef3c7"/>
  <circle cx="55" cy="440" r="6" fill="#f59e0b"/>
  <text x="55" y="443" text-anchor="middle" font-size="8" fill="white">?</text>
  <text x="70" y="435" font-size="11" font-weight="bold" fill="#d97706">Podejrzany numer</text>
  <text x="70" y="450" font-size="9" fill="#92400e">5 dni temu • +48 22 987 6543</text>
  <text x="220" y="443" font-size="9" fill="#d97706">67%</text>
  
  <rect x="35" y="465" width="230" height="40" rx="8" fill="#f0fdf4"/>
  <circle cx="55" cy="485" r="6" fill="#22c55e"/>
  <text x="55" y="488" text-anchor="middle" font-size="8" fill="white">✓</text>
  <text x="70" y="480" font-size="11" font-weight="bold" fill="#16a34a">Rozmowa bezpieczna</text>
  <text x="70" y="495" font-size="9" fill="#14532d">1 tydzień temu • Lekarz</text>
  <text x="220" y="488" font-size="9" fill="#16a34a">5%</text>
  
  <!-- Bottom navigation -->
  <rect x="25" y="540" width="250" height="60" fill="#f9fafb"/>
  <line x1="25" y1="540" x2="275" y2="540" stroke="#e5e7eb" stroke-width="1"/>
  
  <!-- Nav items -->
  <rect x="45" y="555" width="40" height="30" rx="5" fill="transparent"/>
  <text x="65" y="573" text-anchor="middle" font-size="10" fill="#6b7280">🏠</text>
  
  <rect x="105" y="555" width="40" height="30" rx="5" fill="#3AB5B2"/>
  <text x="125" y="573" text-anchor="middle" font-size="10" font-weight="bold" fill="white">📊</text>
  
  <rect x="165" y="555" width="40" height="30" rx="5" fill="transparent"/>
  <text x="185" y="573" text-anchor="middle" font-size="10" fill="#6b7280">⚙️</text>
  
  <rect x="215" y="555" width="40" height="30" rx="5" fill="transparent"/>
  <text x="235" y="573" text-anchor="middle" font-size="10" fill="#6b7280">ℹ️</text>
</svg>